<header class="site-header px2 px-responsive">
  <div class="mt2 wrap">
    <div class="measure">
      <a href="{{ "/" | relative_url }}" class="site-title">{{ site.title }}</a>
      <div class="subtext-title">{{ site.site_subtitle }}</div>
      <nav class="site-nav">
        {% include navigation.html %}
        <button class="theme-toggle" id="theme-toggle" aria-label="Switch between dark and light mode">
          <span class="theme-toggle-icon" id="theme-toggle-icon"></span>
        </button>
      </nav>
      <div class="clearfix"></div>
      {% if site.show_social_icons %}
        {% include social_links.html %}
      {% endif %}
    </div>
  </div>
</header>
